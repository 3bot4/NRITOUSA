name: Daily market data

# Refreshes /data/market.json + /data/history twice per day: 6 AM and 6 PM
# America/New_York. GitHub cron is UTC-only (no DST), so we fire at the two
# possible UTC offsets for each target hour and use a guard step to run only
# when it is actually 06 or 18 in New York. Manual runs always proceed.
#
# 6 AM ET:   10:00 UTC (EDT/summer) or 11:00 UTC (EST/winter)
# 6 PM ET:   22:00 UTC (EDT/summer) or 23:00 UTC (EST/winter)

on:
  schedule:
    - cron: "0 10 * * *" # 06:00 EDT (summer)
    - cron: "0 11 * * *" # 06:00 EST (winter)
    - cron: "0 22 * * *" # 18:00 EDT (summer)
    - cron: "0 23 * * *" # 18:00 EST (winter)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-market
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run (DST-correct 6 AM / 6 PM ET gate)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"; echo "Manual run — proceeding."; exit 0
          fi
          H=$(TZ=America/New_York date +%H)
          echo "Current New York hour: $H"
          if [ "$H" = "06" ] || [ "$H" = "18" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"
          else
            echo "run=no" >> "$GITHUB_OUTPUT"
            echo "Not 6 AM or 6 PM ET — skipping this trigger."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'yes'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.guard.outputs.run == 'yes'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch market data
        if: steps.guard.outputs.run == 'yes'
        env:
          # Recommended (free, no display terms): a FRED API key makes S&P 500,
          # gold, and USD/INR fetch reliably from GitHub's runners. Without it
          # those fall back to keyless sources that often block datacenter IPs.
          # Get one at https://fredaccount.stlouisfed.org/apikeys and add it as a
          # repo secret named FRED_API_KEY.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Optional: point these at an RBI/FBIL JSON endpoint to use the official
          # reference rate as primary (otherwise the ECB/Frankfurter fallback is used).
          RBI_REFERENCE_URL: ${{ vars.RBI_REFERENCE_URL }}
          RBI_REFERENCE_PATH: ${{ vars.RBI_REFERENCE_PATH }}
        run: node scripts/pipeline/fetch-market.mjs

      - name: Commit & push if changed
        if: steps.guard.outputs.run == 'yes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/history
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): market refresh $(TZ=America/New_York date +'%Y-%m-%d %H:%M ET')"
            git push
          fi
