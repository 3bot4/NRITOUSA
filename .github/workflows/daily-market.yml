name: Daily market data

# Refreshes /data/market.json + /data/history every day at 09:00 America/New_York.
# GitHub cron is UTC-only and has no DST support, so we trigger at BOTH 13:00 and
# 14:00 UTC (the two possible UTC times for 9 AM ET across EDT/EST) and let a
# guard step run the fetch only when it is actually 09:00 in New York. Manual
# runs (workflow_dispatch) always proceed.

on:
  schedule:
    - cron: "0 13 * * *" # 09:00 EDT (summer)
    - cron: "0 14 * * *" # 09:00 EST (winter)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-market
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run (DST-correct 9 AM ET gate)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"; echo "Manual run — proceeding."; exit 0
          fi
          H=$(TZ=America/New_York date +%H)
          echo "Current New York hour: $H"
          if [ "$H" = "09" ]; then echo "run=yes" >> "$GITHUB_OUTPUT"; else echo "run=no" >> "$GITHUB_OUTPUT"; echo "Not 9 AM ET — skipping this trigger."; fi

      - name: Checkout
        if: steps.guard.outputs.run == 'yes'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.guard.outputs.run == 'yes'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch market data
        if: steps.guard.outputs.run == 'yes'
        env:
          # Recommended (free, no display terms): a FRED API key makes S&P 500,
          # gold, and USD/INR fetch reliably from GitHub's runners. Without it
          # those fall back to keyless sources that often block datacenter IPs.
          # Get one at https://fredaccount.stlouisfed.org/apikeys and add it as a
          # repo secret named FRED_API_KEY.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Optional: point these at an RBI/FBIL JSON endpoint to use the official
          # reference rate as primary (otherwise the ECB/Frankfurter fallback is used).
          RBI_REFERENCE_URL: ${{ vars.RBI_REFERENCE_URL }}
          RBI_REFERENCE_PATH: ${{ vars.RBI_REFERENCE_PATH }}
        run: node scripts/pipeline/fetch-market.mjs

      - name: Commit & push if changed
        if: steps.guard.outputs.run == 'yes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/history
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): daily market refresh $(TZ=America/New_York date +'%Y-%m-%d')"
            git push
          fi
